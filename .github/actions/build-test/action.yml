name: Build & Test
description: Build and test the solution

inputs:
  version:
    description: 'Version to pass to dotnet build via /p:Version (e.g. 1.2.0). Leave empty to skip.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: |
          src/PrinciPal.VsCodeExtension/package-lock.json
          tests/unit/PrinciPal.VsCodeExtension.Tests/package-lock.json

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore
      shell: bash
      env:
        DOTNET_NOLOGO: 'true'
        DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      run: dotnet restore

    - name: Build
      shell: bash
      env:
        DOTNET_NOLOGO: 'true'
        DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      run: |
        VERSION="${{ inputs.version }}"
        if [ -n "$VERSION" ]; then
          dotnet build --no-restore -c Release -p:Version="$VERSION"
        else
          dotnet build --no-restore -c Release
        fi

    - name: Test (.NET)
      shell: bash
      env:
        DOTNET_NOLOGO: 'true'
        DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
        CI: 'true'
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Install VS Code test dependencies
      shell: bash
      run: npm ci
      working-directory: tests/unit/PrinciPal.VsCodeExtension.Tests

    - name: Test (VS Code extension)
      shell: bash
      env:
        CI: 'true'
      run: npm test
      working-directory: tests/unit/PrinciPal.VsCodeExtension.Tests
