name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "RESOLVED_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Stamp version in VS Extension manifest
        shell: pwsh
        run: |
          $manifest = "src/PrinciPal.VsExtension/source.extension.vsixmanifest"
          (Get-Content $manifest) -replace 'Version="[^"]*"(\s+Language=)', "Version=`"${{ env.RESOLVED_VERSION }}`"`$1" |
            Set-Content $manifest

      - name: Stamp version in VS Code extension package.json
        shell: pwsh
        run: |
          $pkg = "src/PrinciPal.VsCodeExtension/package.json"
          (Get-Content $pkg -Raw) -replace '"version":\s*"[^"]*"', "`"version`": `"${{ env.RESOLVED_VERSION }}`"" |
            Set-Content $pkg -NoNewline

      - name: Build & Test
        uses: ./.github/actions/build-test
        with:
          version: ${{ env.RESOLVED_VERSION }}

      - name: Upload VS Extension VSIX
        uses: actions/upload-artifact@v4
        with:
          name: princiPal-vs.vsix
          path: src/PrinciPal.VsExtension/bin/Release/net48/PrinciPal.VsExtension.vsix
          if-no-files-found: error

      - name: Upload VS Code Extension VSIX
        uses: actions/upload-artifact@v4
        with:
          name: princiPal-vscode.vsix
          path: src/PrinciPal.VsCodeExtension/*.vsix
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Download VS Extension VSIX
        uses: actions/download-artifact@v4
        with:
          name: princiPal-vs.vsix

      - name: Download VS Code Extension VSIX
        uses: actions/download-artifact@v4
        with:
          name: princiPal-vscode.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: princiPal ${{ github.ref_name }}
          generate_release_notes: true
          files: '*.vsix'
