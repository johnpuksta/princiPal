name: Build & Test

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to stamp (e.g. 1.2.0). Leave empty to skip stamping.'
        required: false
        default: ''
        type: string
      upload-artifacts:
        description: 'Upload VSIX artifacts for release'
        required: false
        default: false
        type: boolean

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            src/PrinciPal.VsCodeExtension/package-lock.json
            tests/unit/PrinciPal.VsCodeExtension.Tests/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Resolve version
        if: inputs.version != ''
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "RESOLVED_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Stamp version in Directory.Build.props
        if: inputs.version != ''
        shell: pwsh
        run: |
          $file = "Directory.Build.props"
          (Get-Content $file) -replace '<Version>.*</Version>', "<Version>${{ env.RESOLVED_VERSION }}</Version>" |
            Set-Content $file

      - name: Stamp version in VS Extension manifest
        if: inputs.version != ''
        shell: pwsh
        run: |
          $manifest = "src/PrinciPal.VsExtension/source.extension.vsixmanifest"
          (Get-Content $manifest) -replace 'Version="[^"]*"(\s+Language=)', "Version=`"${{ env.RESOLVED_VERSION }}`"`$1" |
            Set-Content $manifest

      - name: Stamp version in VS Code extension package.json
        if: inputs.version != ''
        shell: pwsh
        run: |
          $pkg = "src/PrinciPal.VsCodeExtension/package.json"
          (Get-Content $pkg -Raw) -replace '"version":\s*"[^"]*"', "`"version`": `"${{ env.RESOLVED_VERSION }}`"" |
            Set-Content $pkg -NoNewline

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (.NET)
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Install VS Code test dependencies
        run: npm ci
        working-directory: tests/unit/PrinciPal.VsCodeExtension.Tests

      - name: Test (VS Code extension)
        run: npm test
        working-directory: tests/unit/PrinciPal.VsCodeExtension.Tests

      - name: Upload VS Extension VSIX
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: princiPal-vs.vsix
          path: src/PrinciPal.VsExtension/bin/Release/net48/PrinciPal.VsExtension.vsix
          if-no-files-found: error

      - name: Upload VS Code Extension VSIX
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: princiPal-vscode.vsix
          path: src/PrinciPal.VsCodeExtension/*.vsix
          if-no-files-found: error
